name: System Tests

# System tests exercise the live Ipregistry API and consume credits, so they do
# not run on every push. They run on demand and on a weekly schedule.
#
# Requires a repository secret named IPREGISTRY_API_KEY. When it is absent (for
# example on a fork), the tests skip cleanly and the job still succeeds.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # every Monday at 06:00 UTC

permissions:
  contents: read

concurrency:
  group: system-tests
  cancel-in-progress: false

jobs:
  system-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          check-latest: true
          cache: false # no go.sum: the library has zero dependencies

      - name: Run system tests
        env:
          IPREGISTRY_API_KEY: ${{ secrets.IPREGISTRY_API_KEY }}
        run: go test -tags integration -run Integration -v ./...
