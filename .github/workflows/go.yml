name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.23', 'stable']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: false # no go.sum: the library has zero dependencies

      - name: Verify formatting
        run: test -z "$(gofmt -l .)" || (echo 'Run gofmt -w .'; gofmt -l .; exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
